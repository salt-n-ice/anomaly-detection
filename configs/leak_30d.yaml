# leak_30d scenario: water leak focus + basement temp.
sensors:
  - id: basement_leak
    capability: water
    archetype: binary
    expected_interval_sec: 7200
    heartbeat_sec: 7200
    deterministic_trigger: true
  - id: basement_temp
    capability: temperature
    archetype: continuous
    expected_interval_sec: 600
    min_value: -40
    max_value: 80
