# outlet scenario: bursty power, continuous voltage
sensors:
  - id: outlet_fridge_power
    capability: power
    archetype: bursty
    expected_interval_sec: 300
    min_value: 0
    max_value: 3000
  - id: outlet_voltage
    capability: voltage
    archetype: continuous
    expected_interval_sec: 600
    min_value: 80
    max_value: 140
