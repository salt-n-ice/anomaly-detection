# outlet kettle scenario: bursty kettle power (high wattage), continuous voltage
sensors:
  - id: outlet_kettle_power
    capability: power
    archetype: bursty
    expected_interval_sec: 300
    min_value: 0
    max_value: 5000
  - id: outlet_voltage
    capability: voltage
    archetype: continuous
    expected_interval_sec: 600
    min_value: 80
    max_value: 140
